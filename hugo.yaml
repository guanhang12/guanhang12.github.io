# ============================================================
#  Hang Guan — Academic Portfolio
# ============================================================

baseURL: "https://guanhang12.github.io/"
languageCode: en
title: "Hang Guan"
theme: hugo-theme-stack

permalinks:
  research: /research/:slug/
  page: /:slug/

# --------------- Global Params ---------------
params:
  mainSections:
    - research
  featuredImageField: image
  rssFullContent: true

  sidebar:
    compact: false
    emoji: ""
    subtitle: "Ph.D. Student · Mechanical Engineering · Texas A&M University"
    avatar: ""  # 添加头像时：把图片放到 assets/img/avatar.png，然后改为 avatar: img/avatar.png

  footer:
    since: 2020
    customText: ""

  dateFormat:
    published: Jan 02, 2006
    lastUpdated: Jan 02, 2006

  article:
    math: true
    toc: true
    readingTime: false
    license:
      enabled: false

  comments:
    enabled: false

  widgets:
    homepage:
      - type: search
      - type: tag-cloud
        params:
          limit: 20
    page:
      - type: toc

  colorScheme:
    toggle: true
    default: auto

  imageProcessing:
    cover:
      enabled: true
    content:
      enabled: true

# --------------- Navigation ---------------
menu:
  main:
    - identifier: home
      name: Home
      url: /
      weight: 10
      params:
        icon: home
    - identifier: research
      name: Research
      url: /research/
      weight: 20
      params:
        icon: flask
    - identifier: publications
      name: Publications
      url: /publications/
      weight: 30
      params:
        icon: book
    - identifier: awards
      name: Awards
      url: /awards/
      weight: 40
      params:
        icon: award
    - identifier: cv
      name: CV
      url: /cv/
      weight: 50
      params:
        icon: file-text
    - identifier: contact
      name: Contact
      url: /contact/
      weight: 60
      params:
        icon: mail

  social:
    - identifier: github
      name: GitHub
      url: "https://github.com/guanhang12"
      params:
        icon: brand-github
    - identifier: scholar
      name: Google Scholar
      url: "https://scholar.google.com/citations?view_op=list_works&hl=en&hl=en&user=A6TRzYYAAAAJ"
      params:
        icon: school
    - identifier: linkedin
      name: LinkedIn
      url: "https://www.linkedin.com/in/hang-guan-4763752a6/"
      params:
        icon: brand-linkedin
    - identifier: email
      name: Email
      url: "mailto:h_guan@tamu.edu"
      params:
        icon: mail

# --------------- Related Content ---------------
related:
  includeNewer: true
  threshold: 60
  toLower: false
  indices:
    - name: tags
      weight: 100
    - name: categories
      weight: 200

# --------------- Markup ---------------
markup:
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    endLevel: 4
    ordered: true
    startLevel: 2
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNos: false
