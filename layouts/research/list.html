{{ define "main" }}
<section class="research-list-page">
    <header class="article-header">
        <h1>{{ .Title }}</h1>
    </header>

    {{ with .Content }}
    <div class="research-intro">
        {{ . }}
    </div>
    {{ end }}

    <div class="research-cards">
        {{ $pages := .Pages.ByWeight }}
        {{ range $pages }}
        <a href="{{ .Permalink }}" class="research-card">
            <strong>{{ .Title }}</strong>
            <span>{{ .Description }}</span>
        </a>
        {{ end }}
    </div>
</section>
{{ end }}
